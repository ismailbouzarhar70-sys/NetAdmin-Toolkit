<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetAdmin Toolkit - IPv4 & IPv6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NetAdmin Toolkit</h1>
            <p style="text-align:center; color:#8b949e;">Calculateur Réseau Multi-Protocole</p>
        </header>

        <section>
            <div class="form-group">
                <label>Version du Protocole</label>
                <select id="ipVersion">
                    <option value="v4">IPv4 (Standard)</option>
                    <option value="v6">IPv6 (Next Gen)</option>
                </select>
            </div>

            <div id="v4Inputs">
                <div class="form-group">
                    <label>Adresse IP</label>
                    <input type="text" id="ipInput" placeholder="ex: 192.168.1.0">
                </div>
                <div class="form-group">
                    <label>Masque (CIDR /n)</label>
                    <input type="number" id="cidrInput" value="24" min="0" max="32">
                </div>
            </div>

            <div id="v6Inputs" style="display: none;">
                <div class="form-group">
                    <label>Adresse IPv6</label>
                    <input type="text" id="ip6Input" placeholder="ex: 2001:db8::1">
                </div>
                <div class="form-group">
                    <label>Préfixe (/n)</label>
                    <input type="number" id="cidr6Input" value="64" min="0" max="128">
                </div>
            </div>

            <button id="calculateBtn">Calculer les détails</button>
            <button id="configBtn" style="background-color: #58a6ff; margin-top: 10px; display: none;">Générer Config Cisco</button>
        </section>

        <section id="resultSection" style="display: none;">
            <h2 style="font-size: 1.2rem; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px;">Résultats du Calcul</h2>
            <div class="results-container">
                <div class="result-item"><strong>ID Réseau :</strong> <span id="resNetwork"></span></div>
                <div class="result-item"><strong>Masque :</strong> <span id="resMask"></span></div>
                <div class="result-item"><strong>Première IP :</strong> <span id="resFirst"></span></div>
                <div class="result-item"><strong>Dernière IP :</strong> <span id="resLast"></span></div>
                <div class="result-item"><strong>Broadcast :</strong> <span id="resBroadcast"></span></div>
                <div class="result-item"><strong>Nombre d'hôtes :</strong> <span id="resHosts"></span></div>
            </div>

            <div id="configArea" style="display: none; margin-top: 25px;">
                <strong style="color: #58a6ff; font-size: 0.8rem; text-transform: uppercase;">Console Cisco :</strong>
                <pre id="ciscoCode"></pre>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
