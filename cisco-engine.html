<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Engine - NetAdmin Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.15); }
        pre { background: #0f172a; border-radius: 16px; }
    </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 min-h-screen">

    <div class="flex pt-24">
        <aside class="w-72 bg-[#0f172a] border-r border-slate-700 h-[calc(100vh-6rem)] fixed hidden lg:block overflow-auto">
            <div class="p-6 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">Homepage</a>
                <a href="ip-manager.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">IP Manager</a>
                <a href="cisco-engine.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-cyan-500/10 text-cyan-400">Cisco Engine</a>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-8">
            <h1 class="text-5xl font-bold mb-2">Cisco Engine</h1>
            <p class="text-slate-400 mb-10">Professional Cisco IOS Configuration Generator</p>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="templates"></div>

            <!-- Zone de Configuration -->
            <div id="configArea" class="hidden mt-12">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold text-cyan-400" id="configTitle"></h3>
                    <div class="flex gap-3">
                        <button onclick="copyConfig()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl text-sm font-medium">Copy</button>
                        <button onclick="downloadConfig()" class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 rounded-2xl text-sm font-medium">Download .txt</button>
                    </div>
                </div>
                <pre><code id="configCode" class="language-cisco"></code></pre>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const templates = [
            { id: "vlan", title: "VLAN Configuration", icon: "tag", color: "emerald", desc: "Creation of VLANs + Trunk" },
            { id: "acl", title: "ACL (Access List)", icon: "shield", color: "rose", desc: "Standard & Extended ACL" },
            { id: "ospf", title: "OSPF Configuration", icon: "globe", color: "amber", desc: "Single & Multi Area" },
            { id: "ospf-md5", title: "Secure OSPF (MD5)", icon: "shield-check", color: "amber", desc: "OSPF with authentication MD5" },
            { id: "username", title: "Configuration Username", icon: "user", color: "blue", desc: "Local users + privileges" },
            { id: "ssh", title: "SSH + Disable Telnet", icon: "key", color: "cyan", desc: "Securing remote access" },
            { id: "dhcp", title: "DHCP Server", icon: "server", color: "sky", desc: "DHCP Configuration" },
            { id: "vpn", title: "VPN Site-to-Site", icon: "globe", color: "rose", desc: "IPsec VPN between sites" },
            { id: "dot1x", title: "IEEE 802.1X", icon: "shield", color: "emerald", desc: "802.1X Authentication" }
        ];

        function loadTemplates() {
            const container = document.getElementById('templates');
            container.innerHTML = templates.map(t => `
                <div onclick="generateConfig('${t.id}')" 
                     class="glass p-6 rounded-3xl hover:scale-105 cursor-pointer transition-all group">
                    <div class="w-14 h-14 bg-gradient-to-br from-${t.color}-500 to-${t.color}-600 rounded-2xl flex items-center justify-center mb-5 group-hover:rotate-12 transition-transform">
                        <i data-lucide="${t.icon}" class="w-8 h-8 text-white"></i>
                    </div>
                    <h3 class="font-semibold text-xl mb-2">${t.title}</h3>
                    <p class="text-slate-400 text-sm">${t.desc}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function generateConfig(type) {
            let title = "";
            let code = "";

            switch(type) {
                case "vlan":
                    title = "VLAN Configuration";
                    code = `vlan 10\n name IT_Department\nvlan 20\n name Administration\n!`;
                    break;
                case "acl":
                    title = "ACL Configuration";
                    code = `ip access-list extended BLOCK_WEB\n deny tcp any any eq 80\n permit ip any any\n!`;
                    break;
                case "ospf":
                    title = "OSPF Configuration";
                    code = `router ospf 1\n network 192.168.1.0 0.0.0.255 area 0\n!`;
                    break;
                case "ospf-md5":
                    title = "OSPF Sécurisé (MD5)";
                    code = `router ospf 1\n area 0 authentication message-digest\n interface Gi0/1\n  ip ospf message-digest-key 1 md5 MonSecret123\n!`;
                    break;
                case "username":
                    title = "Configuration Username";
                    code = `username netadmin privilege 15 secret Cisco_CCNA7\n!`;
                    break;
                case "ssh":
                    title = "SSH + Désactiver Telnet";
                    code = `ip ssh version 2\n line vty 0 4\n  transport input ssh\n!`;
                    break;
                case "dhcp":
                    title = "DHCP Server";
                    code = `ip dhcp pool LAN_POOL\n network 192.168.10.0 255.255.255.0\n default-router 192.168.10.1\n!`;
                    break;
                case "vpn":
                    title = "VPN Site-to-Site";
                    code = `crypto isakmp policy 10\n encr aes 256\n authentication pre-share\n!`;
                    break;
                case "dot1x":
                    title = "IEEE 802.1X";
                    code = `aaa new-model\n interface Gi0/5\n  authentication port-control auto\n!`;
                    break;
            }

            document.getElementById('configTitle').textContent = title;
            document.getElementById('configCode').textContent = code;
            document.getElementById('configArea').classList.remove('hidden');
            hljs.highlightAll();
        }

        function copyConfig() {
            const text = document.getElementById('configCode').textContent;
            navigator.clipboard.writeText(text).then(() => alert("✅ Configuration copiée !"));
        }

        function downloadConfig() {
            const text = document.getElementById('configCode').textContent;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cisco_config.txt';
            a.click();
        }

        window.onload = () => {
            loadTemplates();
            lucide.createIcons();
        };
    </script>
</body>
</html>
