<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - NetAdmin Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.15); }
    </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 min-h-screen">

    <div class="flex pt-24">
        <aside class="w-72 bg-[#0f172a] border-r border-slate-700 h-[calc(100vh-6rem)] fixed hidden lg:block overflow-auto">
            <div class="p-6 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">Accueil</a>
                <a href="ip-manager.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">IP Manager</a>
                <a href="cisco-engine.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">Cisco Engine</a>
                <a href="tools.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">Admin Tools</a>
                <a href="feedback.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-cyan-500/10 text-cyan-400">Feedback</a>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-8">
            <div class="max-w-2xl mx-auto">
                <h1 class="text-5xl font-bold mb-2">Votre Avis Compte !</h1>
                <p class="text-slate-400 mb-10">Répondez à ce court QCM pour nous aider à améliorer NetAdmin Toolkit</p>

                <div id="quizContainer" class="glass rounded-3xl p-10">
                    <div id="questionContainer"></div>
                    <div class="flex justify-between mt-10">
                        <button onclick="prevQuestion()" id="btnPrev" 
                                class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl hidden">Précédent</button>
                        <button onclick="nextQuestion()" id="btnNext" 
                                class="px-8 py-3 bg-cyan-500 hover:bg-cyan-600 rounded-2xl">Suivant</button>
                    </div>
                </div>

                <!-- Résultat Final Amélioré -->
                <div id="resultContainer" class="hidden glass rounded-3xl p-12 text-center">
                    <div class="mb-8">
                        <i data-lucide="heart" class="w-20 h-20 text-pink-500 mx-auto"></i>
                    </div>
                    <h2 class="text-4xl font-bold mb-3">Merci pour votre retour !</h2>
                    <div id="scoreDisplay" class="text-7xl font-bold text-cyan-400 mb-6"></div>
                    <p id="feedbackMessage" class="text-xl text-slate-300 leading-relaxed"></p>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const questions = [
            { q: "Globalement, comment trouvez-vous le design du site ?", options: ["Très beau et professionnel", "Bien", "Moyen", "Peut être amélioré"] },
            { q: "La navigation et l'interface sont-elles faciles à utiliser ?", options: ["Très faciles", "Faciles", "Un peu compliquées", "Difficiles"] },
            { q: "Les outils proposés vous sont-ils utiles ?", options: ["Très utiles", "Utiles", "Moyennement utiles", "Pas vraiment"] },
            { q: "La vitesse de chargement du site vous satisfait-elle ?", options: ["Très rapide", "Rapide", "Acceptable", "Lente"] },
            { q: "Recommanderiez-vous NetAdmin Toolkit à vos camarades ?", options: ["Oui, sans hésiter", "Probablement oui", "Peut-être", "Non"] }
        ];

        let currentQuestion = 0;
        let answers = [];

        function loadQuestion() {
            const q = questions[currentQuestion];
            let html = `<h3 class="text-2xl font-semibold mb-8">${q.q}</h3><div class="space-y-4">`;

            q.options.forEach((opt, i) => {
                html += `
                    <button onclick="selectAnswer(${i})" 
                            class="w-full text-left px-6 py-5 rounded-2xl border border-slate-600 hover:border-cyan-400 hover:bg-slate-800 transition-all">
                        ${opt}
                    </button>`;
            });
            html += `</div>`;
            document.getElementById('questionContainer').innerHTML = html;

            document.getElementById('btnPrev').classList.toggle('hidden', currentQuestion === 0);
        }

        function selectAnswer(index) {
            answers[currentQuestion] = index;
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        }

        function showResults() {
            let positive = answers.filter(a => a === 0 || a === 1).length;
            let score = Math.round((positive / questions.length) * 100);

            let message = "";
            if (score >= 80) message = "Merci beaucoup ! Vous semblez très satisfait 😊";
            else if (score >= 60) message = "Merci pour votre retour. Nous allons continuer à améliorer le site.";
            else message = "Merci pour votre honnêteté. Nous prendrons en compte vos remarques.";

            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('scoreDisplay').textContent = score + "%";
            document.getElementById('feedbackMessage').textContent = message;
        }

        window.onload = () => {
            lucide.createIcons();
            loadQuestion();
        };
    </script>
</body>
</html>
