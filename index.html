<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetAdmin Toolkit v2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(22, 27, 34, 0.97);
            backdrop-filter: blur(16px);
        }
        
        .mode-card {
            transition: all 0.4s cubic-bezier(0.4, 0.2, 1);
        }
        
        .mode-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.5);
        }
        
        .nav-link {
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background-color: #21262d;
            border-radius: 12px;
        }
        
        .nav-link.active {
            background-color: #58a6ff;
            color: white;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] min-h-screen">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 bg-[#161b22] border-b border-[#30363d] z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-xl">N</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter">NetAdmin Toolkit</h1>
                    <p class="text-sm text-gray-500 -mt-1">v2.6 • Engineering Suite</p>
                </div>
            </div>
            
            <div class="flex items-center gap-5">
                <button onclick="toggleDarkMode()" id="theme-toggle"
                        class="p-3 rounded-2xl hover:bg-[#30363d] transition-all text-2xl">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="https://github.com/ismailbouzarhar70-sys/NetAdmin-Toolkit" target="_blank" 
                   class="text-3xl hover:text-white transition-colors">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>
    </header>

    <div class="flex pt-24">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-[#161b22] border-r border-[#30363d] h-[calc(100vh-6rem)] fixed hidden lg:block overflow-y-auto">
            <div class="p-8">
                <nav class="space-y-2">
                    <a href="index.html" class="nav-link active flex items-center gap-3 px-6 py-4 text-base font-medium">
                        <i data-lucide="home" class="w-6 h-6"></i>
                        Accueil
                    </a>
                    <a href="calculateur.html?mode=ip" class="nav-link flex items-center gap-3 px-6 py-4 text-base font-medium">
                        <i data-lucide="network" class="w-6 h-6"></i>
                        IP Manager
                    </a>
                    <a href="calculateur.html?mode=cisco" class="nav-link flex items-center gap-3 px-6 py-4 text-base font-medium">
                        <i data-lucide="cpu" class="w-6 h-6"></i>
                        Cisco Engine
                    </a>
                    <a href="cours.html" class="nav-link flex items-center gap-3 px-6 py-4 text-base font-medium">
                        <i data-lucide="book-open" class="w-6 h-6"></i>
                        IT Academy
                    </a>
                    <a href="tools.html" class="nav-link flex items-center gap-3 px-6 py-4 text-base font-medium">
                        <i data-lucide="toolbox" class="w-6 h-6"></i>
                        Admin Tools
                    </a>
                </nav>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 lg:ml-72 p-8 lg:p-12">
            <div class="max-w-5xl mx-auto">
                <div class="text-center mb-16">
                    <h2 class="text-5xl font-bold tracking-tight mb-4">Bienvenue dans ton Toolkit</h2>
                    <p class="text-xl text-gray-400 max-w-lg mx-auto">
                        Tout ce dont tu as besoin pour administrer et apprendre les réseaux.
                    </p>
                </div>

                <!-- GRILLE -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="modes-grid"></div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const modules = [
            {
                title: "IP Manager",
                icon: "network",
                color: "blue",
                desc: "Calculateur IPv4 / IPv6, subnetting, VLSM",
                link: "calculateur.html?mode=ip"
            },
            {
                title: "Cisco Engine",
                icon: "cpu",
                color: "emerald",
                desc: "Générateur de configurations Cisco (ACL, VLAN, OSPF, NAT...)",
                link: "calculateur.html?mode=cisco"
            },
            {
                title: "IT Academy",
                icon: "book-open",
                color: "amber",
                desc: "Cours, fiches de révision et quizzes CCNA / Linux",
                link: "cours.html"
            },
            {
                title: "Admin Tools",
                icon: "toolbox",
                color: "violet",
                desc: "Commandes, convertisseurs, outils système",
                link: "tools.html"
            }
        ];

        function renderCards() {
            const container = document.getElementById('modes-grid');
            container.innerHTML = '';

            modules.forEach(mod => {
                const cardHTML = `
                    <div class="mode-card glass border border-[#30363d] rounded-3xl p-10 text-center group">
                        <div class="w-28 h-28 mx-auto mb-8 rounded-3xl bg-gradient-to-br from-${mod.color}-500 to-${mod.color}-600 flex items-center justify-center shadow-2xl">
                            <i data-lucide="${mod.icon}" class="w-14 h-14 text-white"></i>
                        </div>
                        <h3 class="text-3xl font-semibold mb-4">${mod.title}</h3>
                        <p class="text-gray-400 mb-12 text-[17px] leading-relaxed">${mod.desc}</p>
                        <a href="${mod.link}" 
                           class="block w-full py-6 rounded-2xl font-semibold text-lg shadow-lg transition-all 
                                  bg-gradient-to-r from-${mod.color}-600 to-${mod.color}-700 hover:brightness-110 active:scale-[0.97]">
                            Ouvrir →
                        </a>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
            
            lucide.createIcons();
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                btn.innerHTML = `<i class="fa-solid fa-sun"></i>`;
            } else {
                html.classList.add('dark');
                btn.innerHTML = `<i class="fa-solid fa-moon"></i>`;
            }
        }

        window.onload = renderCards;
    </script>
</body>
</html>
