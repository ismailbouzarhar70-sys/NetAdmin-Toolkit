<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetAdmin Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.15); }
        .cyber-glow { text-shadow: 0 0 20px rgb(34 211 238); }
    </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 min-h-screen">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 bg-[#0f172a]/95 border-b border-cyan-500/30 z-50 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-3xl flex items-center justify-center text-3xl font-bold shadow-xl">NT</div>
                <div>
                    <h1 class="title text-3xl font-bold tracking-tighter cyber-glow">NetAdmin Toolkit</h1>
                    <p class="text-cyan-400 text-sm -mt-1">Professional Network Engineering Suite</p>
                </div>
            </div>
            <button onclick="toggleTheme()" class="text-2xl hover:text-cyan-400">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="flex pt-24">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-[#0f172a] border-r border-slate-700 h-[calc(100vh-6rem)] fixed hidden lg:block overflow-auto">
            <div class="p-6 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-cyan-500/10 text-cyan-400">
                    <i data-lucide="home" class="w-5 h-5"></i> Accueil
                </a>
                <a href="ip-manager.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">
                    <i data-lucide="network" class="w-5 h-5"></i> IP Manager
                </a>
                <a href="cisco-engine.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">
                    <i data-lucide="cpu" class="w-5 h-5"></i> Cisco Engine
                </a>
                <a href="tools.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">
                    <i data-lucide="toolbox" class="w-5 h-5"></i> Admin Tools
                </a>
                <a href="feedback.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">
                    <i data-lucide="message-square" class="w-5 h-5"></i> Feedback
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 lg:ml-72 p-8">
            <div class="max-w-6xl mx-auto text-center">
                <h2 class="title text-6xl font-bold tracking-tighter mb-6 cyber-glow">NetAdmin Toolkit</h2>
                <p class="text-2xl text-slate-400 mb-16">Votre plateforme tout-en-un pour les systèmes et réseaux</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="cards"></div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const cards = [
            {title: "IP Manager", icon: "network", color: "cyan", desc: "Subnetting, VLSM, IPv4/IPv6", link: "ip-manager.html"},
            {title: "Cisco Engine", icon: "cpu", color: "blue", desc: "Générateur de configurations Cisco", link: "cisco-engine.html"},
            {title: "Admin Tools", icon: "toolbox", color: "violet", desc: "Outils & Commandes", link: "tools.html"}
        ];

        function createCards() {
            const container = document.getElementById('cards');
            container.innerHTML = cards.map(c => `
                <a href="${c.link}" class="glass rounded-3xl p-8 hover:scale-105 transition-all group">
                    <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-${c.color}-500 to-${c.color}-600 rounded-2xl flex items-center justify-center group-hover:rotate-6 transition-transform">
                        <i data-lucide="${c.icon}" class="w-10 h-10 text-white"></i>
                    </div>
                    <h3 class="text-2xl font-semibold mb-3">${c.title}</h3>
                    <p class="text-slate-400">${c.desc}</p>
                </a>
            `).join('');
            lucide.createIcons();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        window.onload = createCards;
    </script>
</body>
</html>
