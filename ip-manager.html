<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Manager - NetAdmin Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(148, 163, 184, 0.15); 
        }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .animate-in { animation: fadeInUp 0.7s ease forwards; }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover { transform: translateX(12px); background-color: rgba(34, 211, 238, 0.1) !important; }
        .result-card { transition: all 0.4s ease; }
        .result-card:hover { transform: scale(1.03); }
    </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 min-h-screen">

    <div class="flex pt-24">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-[#0f172a] border-r border-slate-700 h-[calc(100vh-6rem)] fixed hidden lg:block overflow-auto">
            <div class="p-6 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800 sidebar-link">
                    <i data-lucide="home" class="w-5 h-5"></i> Homepage
                </a>
                <a href="ip-manager.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-cyan-500/10 text-cyan-400 sidebar-link">
                    <i data-lucide="network" class="w-5 h-5"></i> IP Manager
                </a>
                <a href="cisco-engine.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800 sidebar-link">
                    <i data-lucide="cpu" class="w-5 h-5"></i> Cisco Engine
                </a>
                <a href="tools.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800 sidebar-link">
                    <i data-lucide="toolbox" class="w-5 h-5"></i> Career Guide
                </a>
                <a href="learning.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800 sidebar-link">
                    <i data-lucide="play-circle" class="w-5 h-5"></i> Learning Resources
                </a>
                <a href="feedback.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800 sidebar-link">
                    <i data-lucide="message-square" class="w-5 h-5"></i> Feedback
                </a>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-8">
            <h1 class="text-5xl font-bold mb-2 animate-in">IP Manager</h1>
            <p class="text-slate-400 mb-10 text-xl animate-in">Professional IPv4 and IPv6 Calculator</p>

            <div class="glass rounded-3xl p-8">
                <!-- Tabs -->
                <div class="flex border-b border-slate-700 mb-8">
                    <button onclick="switchTab(0)" id="tab-ipv4" 
                            class="px-8 py-4 font-medium border-b-2 border-cyan-400 text-cyan-400">IPv4</button>
                    <button onclick="switchTab(1)" id="tab-ipv6" 
                            class="px-8 py-4 font-medium text-slate-400">IPv6</button>
                </div>

                <!-- IPv4 Section -->
                <div id="section-ipv4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">IPv4 address</label>
                            <input type="text" id="ipv4Addr" value="192.168.1.0" 
                                   class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-lg focus:border-cyan-400">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">CIDR (/n)</label>
                            <input type="number" id="cidr4" value="24" min="0" max="32"
                                   class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-lg focus:border-cyan-400">
                        </div>
                    </div>
                    <button onclick="calcIPv4()" 
                            class="mt-8 w-full bg-cyan-500 hover:bg-cyan-600 py-5 rounded-2xl font-semibold text-lg btn-hover">
                        Calculate IPv4
                    </button>
                </div>

                <!-- IPv6 Section -->
                <div id="section-ipv6" class="hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">IPv6 address</label>
                            <input type="text" id="ipv6Addr" value="2001:db8:acad:1::" 
                                   class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-lg focus:border-cyan-400">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Prefix (/n)</label>
                            <input type="number" id="cidr6" value="64" min="0" max="128"
                                   class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-lg focus:border-cyan-400">
                        </div>
                    </div>
                    <button onclick="calcIPv6()" 
                            class="mt-8 w-full bg-cyan-500 hover:bg-cyan-600 py-5 rounded-2xl font-semibold text-lg btn-hover">
                        Calculate IPv6
                    </button>
                </div>

                <!-- Results -->
                <div id="results" class="hidden mt-10"></div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        function switchTab(tab) {
            document.getElementById('section-ipv4').classList.toggle('hidden', tab !== 0);
            document.getElementById('section-ipv6').classList.toggle('hidden', tab !== 1);

            document.getElementById('tab-ipv4').classList.toggle('border-cyan-400', tab === 0);
            document.getElementById('tab-ipv4').classList.toggle('text-cyan-400', tab === 0);
            document.getElementById('tab-ipv6').classList.toggle('border-cyan-400', tab === 1);
            document.getElementById('tab-ipv6').classList.toggle('text-cyan-400', tab === 1);
        }

        function calcIPv4() {
            const ip = document.getElementById('ipv4Addr').value.trim();
            const cidr = parseInt(document.getElementById('cidr4').value);
            
            if (!ip) return alert("Enter an IPv4 address");
            
            const parts = ip.split('.').map(Number);
            if (parts.length !== 4 || parts.some(p => isNaN(p) || p < 0 || p > 255)) {
                return alert("Invalid IPv4 Address");
            }

            const mask = ~((1 << (32 - cidr)) - 1);
            const ipInt = (parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3];
            const network = ipInt & mask;
            const broadcast = network | ~mask;
            const toIP = n => [(n>>24)&255, (n>>16)&255, (n>>8)&255, n&255].join('.');

            const html = `
                <div class="glass result-card rounded-3xl p-8 animate-in">
                    <h3 class="text-cyan-400 text-xl font-semibold mb-6">IPv4 Results</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-lg">
                        <div><strong>Network :</strong> ${toIP(network)}/${cidr}</div>
                        <div><strong>First IP :</strong> ${toIP(network + 1)}</div>
                        <div><strong>Last IP :</strong> ${toIP(broadcast - 1)}</div>
                        <div><strong>Broadcast :</strong> ${toIP(broadcast)}</div>
                        <div class="md:col-span-2"><strong>Hôtes utilisables :</strong> ${(1 << (32 - cidr)) - 2}</div>
                    </div>
                </div>
            `;
            document.getElementById('results').innerHTML = html;
            document.getElementById('results').classList.remove('hidden');
        }

        function calcIPv6() {
            const addr = document.getElementById('ipv6Addr').value.trim();
            const prefix = parseInt(document.getElementById('cidr6').value);

            if (!addr) return alert("Enter an IPv6 address");

            const network = addr.split('::')[0] + '::';

            const html = `
                <div class="glass result-card rounded-3xl p-8 animate-in">
                    <h3 class="text-cyan-400 text-xl font-semibold mb-6">IPv6 Results</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-lg">
                        <div><strong>Address :</strong> ${addr}</div>
                        <div><strong>Prefix :</strong> /${prefix}</div>
                        <div><strong>Network :</strong> ${network}/${prefix}</div>
                        <div class="text-emerald-400"><strong>First Address :</strong> ${network}1</div>
                    </div>
                </div>
            `;

            document.getElementById('results').innerHTML = html;
            document.getElementById('results').classList.remove('hidden');
        }

        window.onload = () => {
            lucide.createIcons();
            switchTab(0);
        };
    </script>

    <!-- FOOTER -->
    <footer class="bg-[#0a0f1c] border-t border-slate-700 py-10 mt-20">
        <div class="max-w-7xl mx-auto px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-xl font-bold">NT</div>
                    <div>
                        <p class="font-semibold">NetAdmin Toolkit</p>
                        <p class="text-xs text-slate-500">v2.7 • Made in Tanger 🇲🇦</p>
                    </div>
                </div>
                <div class="text-slate-400 text-sm text-center md:text-right">
                    © 2026 Ismail Bouzarhar. All rights reserved.<br>
                    Student project in Systems and Networks
                </div>
                <a href="https://github.com/ismailbouzarhar70-sys/NetAdmin-Toolkit" target="_blank" class="text-2xl hover:text-cyan-400">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
