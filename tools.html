<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tools - NetAdmin Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.15); }
    </style>
</head>
<body class="bg-[#0a0f1c] text-slate-200 min-h-screen">

    <div class="flex pt-24">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-[#0f172a] border-r border-slate-700 h-[calc(100vh-6rem)] fixed hidden lg:block overflow-auto">
            <div class="p-6 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">Accueil</a>
                <a href="ip-manager.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">IP Manager</a>
                <a href="cisco-engine.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-slate-800">Cisco Engine</a>
                <a href="tools.html" class="flex items-center gap-3 px-5 py-4 rounded-2xl bg-cyan-500/10 text-cyan-400">Admin Tools</a>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-8">
            <h1 class="text-5xl font-bold mb-2">Admin Tools</h1>
            <p class="text-slate-400 mb-10">Boîte à outils complète pour administrateurs réseaux</p>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <!-- Convertisseur d'Adresses -->
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">IP / Binary / Hex Converter</h3>
                    <input type="text" id="convertInput" placeholder="192.168.1.1 or 2001:db8::1" 
                           class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 mb-4">
                    <button onclick="convertAddress()" class="w-full bg-cyan-500 hover:bg-cyan-600 py-3 rounded-2xl">Convert</button>
                    <div id="convertResult" class="mt-4 text-sm font-mono bg-slate-900 p-4 rounded-2xl"></div>
                </div>

                <!-- Générateur de Mot de Passe -->
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Password Generator</h3>
                    <div class="flex gap-3 mb-4">
                        <input type="number" id="passLength" value="16" class="w-24 bg-slate-900 border border-slate-600 rounded-2xl px-4 py-3">
                        <button onclick="generatePassword()" class="flex-1 bg-violet-500 hover:bg-violet-600 py-3 rounded-2xl">Generate</button>
                    </div>
                    <div id="passwordResult" class="font-mono text-lg bg-slate-900 p-4 rounded-2xl break-all min-h-[52px]"></div>
                </div>

                <!-- Calculateur Bande Passante - Version Améliorée -->
                <div class="glass rounded-3xl p-7">
                    <h3 class="text-xl font-semibold mb-6 flex items-center gap-3">
                        <i data-lucide="zap" class="w-6 h-6 text-emerald-400"></i>
                        Bandwidth Calculator
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">File Size</label>
                            <div class="flex gap-3">
                                <input type="number" id="fileSize" value="500" 
                                       class="flex-1 bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-lg">
                                <select id="sizeUnit" class="bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4">
                                    <option value="MB">MB</option>
                                    <option value="GB">GB</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Connection Speed</label>
                            <select id="bandwidth" class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-lg">
                                <option value="10">10 Mbps</option>
                                <option value="50" selected>50 Mbps</option>
                                <option value="100">100 Mbps</option>
                                <option value="300">300 Mbps</option>
                                <option value="1000">1 Gbps (Gigabit)</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="calcBandwidthAdvanced()" 
                            class="mt-8 w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 py-5 rounded-2xl font-semibold text-lg transition-all active:scale-95">
                        Calculate Transfer Time
                    </button>

                    <div id="bandwidthResult" class="hidden mt-8 grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </div>

                <!-- Ports TCP/UDP -->
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Common TCP/UDP Ports</h3>
                    <input type="text" id="portSearch" placeholder="Search port or service..." 
                           onkeyup="searchPort()" class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4">
                    <div id="portResult" class="mt-4 max-h-60 overflow-auto text-sm"></div>
                </div>

                <!-- Commandes Cisco Utiles -->
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-xl font-semibold mb-4">Common Cisco Commands</h3>
                    <div onclick="copyCommand('show running-config')" class="bg-slate-900 hover:bg-slate-800 p-4 rounded-2xl cursor-pointer mb-2">show running-config</div>
                    <div onclick="copyCommand('show ip interface brief')" class="bg-slate-900 hover:bg-slate-800 p-4 rounded-2xl cursor-pointer mb-2">show ip interface brief</div>
                    <div onclick="copyCommand('show vlan brief')" class="bg-slate-900 hover:bg-slate-800 p-4 rounded-2xl cursor-pointer">show vlan brief</div>
                </div>

            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        function convertAddress() {
            const input = document.getElementById('convertInput').value.trim();
            let result = "";
            if (input.includes('.')) {
                const parts = input.split('.').map(Number);
                const bin = parts.map(p => p.toString(2).padStart(8,'0')).join('.');
                result = `<strong>Binary:</strong> ${bin}<br><strong>Hex:</strong> ${parts.map(p => p.toString(16).padStart(2,'0').toUpperCase()).join('.')}`;
            }
            document.getElementById('convertResult').innerHTML = result;
        }

        function generatePassword() {
            const len = parseInt(document.getElementById('passLength').value) || 16;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
            let pass = "";
            for(let i = 0; i < len; i++) {
                pass += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById('passwordResult').textContent = pass;
        }

        function calcBandwidthAdvanced() {
            let size = parseFloat(document.getElementById('fileSize').value);
            const unit = document.getElementById('sizeUnit').value;
            const speedMbps = parseFloat(document.getElementById('bandwidth').value);

            if (!size || size <= 0) return alert("Veuillez entrer une taille valide");

            if (unit === "GB") size *= 1024;
            const sizeMbits = size * 8;
            const timeSec = (sizeMbits / speedMbps).toFixed(1);
            const timeMin = (timeSec / 60).toFixed(2);

            const html = `
                <div class="bg-emerald-500/10 border border-emerald-500/30 p-5 rounded-2xl text-center">
                    <p class="text-emerald-400 text-sm">Estimated Time</p>
                    <p class="text-3xl font-bold">${timeSec} <span class="text-base">sec</span></p>
                </div>
                <div class="bg-slate-900/70 p-5 rounded-2xl text-center">
                    <p class="text-slate-400 text-sm">In Minutes</p>
                    <p class="text-2xl font-semibold">${timeMin} min</p>
                </div>
                <div class="bg-slate-900/70 p-5 rounded-2xl text-center">
                    <p class="text-slate-400 text-sm">Connection Speed</p>
                    <p class="text-xl">${speedMbps} Mbps</p>
                </div>
            `;

            document.getElementById('bandwidthResult').innerHTML = html;
            document.getElementById('bandwidthResult').classList.remove('hidden');
        }

        function searchPort() {
            const q = document.getElementById('portSearch').value.toLowerCase();
            const ports = [
                {p:80,s:"HTTP"}, {p:443,s:"HTTPS"}, {p:22,s:"SSH"}, 
                {p:23,s:"Telnet"}, {p:53,s:"DNS"}, {p:3389,s:"RDP"}
            ];
            let html = "";
            ports.forEach(item => {
                if (item.p.toString().includes(q) || item.s.toLowerCase().includes(q)) {
                    html += `<div class="bg-slate-900 p-3 rounded-xl mb-2"><strong>${item.p}</strong> - ${item.s}</div>`;
                }
            });
            document.getElementById('portResult').innerHTML = html || "<p class='text-slate-400'>Aucun résultat</p>";
        }

        function copyCommand(cmd) {
            navigator.clipboard.writeText(cmd).then(() => alert("✅ Commande copiée : " + cmd));
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
